<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>Document</title>
  </head>
  <style>
    .cardsec {
      max-width: 800px;
      width: 100%;

      /* height: -100px; */

      /* border: 1px solid black; */
      /* margin: 20px auto; */
    }

    .cardsec .card-img-top {
      height: 160px;
      object-fit: cover;
      width: 100%;
    }
    .card {
      background-color: #0c2f79;
      color: #fff;
    }

    .card-title {
      margin-top: 10px;
    }

    .water-flip-card {
      perspective: 1000px;
      height: 290px;
    }

    .water-flip-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }

    .water-flip-card:hover .water-flip-inner {
      transform: rotateY(180deg);
    }

    .water-front,
    .water-back {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .water-front {
      height: 346px;
      position: relative;
      /* border: px solid black; */
      border-radius: 5px;
      overflow: hidden;
    }

    .water-back {
      margin-top: -320px;
      background-color: #ffffff;
      color: #000;
      transform: rotateY(180deg);
      border-radius: 5px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border: 1px solid rgba(0, 0, 0, 0.125);
      overflow: hidden;
    }

    /* Modal (Box) နောက်ခံ မည်းမည်းလွှာ */
    .custom-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1050;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    /* Modal ပွင့်လာချိန်မှာ ပြသရန် Class */
    .custom-modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* Modal Box ရဲ့ ပုံစံ */
    .custom-modal-box {
      background-color: #ffffff;
      padding: 25px;
      border-radius: 15px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      position: relative;
      transform: translateY(-20px);
      transition: transform 0.3s ease;
    }

    .custom-modal-overlay.show .custom-modal-box {
      transform: translateY(0);
    }

    /* Close Button (X) */
    .modal-close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      font-size: 24px;
      background: none;
      border: none;
      cursor: pointer;
      color: #333;
    }

    /* Modal ထဲက ပုံများ ညှိရန် */
    .modal-sticker,
    .modal-qr {
      max-width: 180px;
      margin: 10px auto;
      display: block;
    }
  </style>
  <body>
    <div class="containerforcard bg">
      <section class="cardsec">
        <div class="row row-cols-1 row-cols-md-3 g-4">
          <div class="col">
            <div class="card">
              <img
                src="images/mala-xiang-guo-970x526.jpg"
                class="card-img-top"
                alt="..."
              />
              <div class="card-body">
                <h5 class="card-title">မာလာရှမ်းကော</h5>

                <a id="choosebtn" href="#" class="choose-btn" data-text="Kpay QRကို scan ဖတ်ပြီး 11000 လွှဲပေးပါ"><span>ရွေးချယ်မယ်</span> </a>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <img
                src="images/view-delicious-food-sold-streets-city.jpg"
                class="card-img-top"
                alt="..."
              />
              <div class="card-body">
                <h5 class="card-title">အကင်</h5>
                <a id="choosebtn" href="#" class="choose-btn" data-text="Kpay QRကို scan ဖတ်ပြီး 10000 လွှဲပေးပါ"><span>ရွေးချယ်မယ်</span> </a>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <img src="images/chiken.webp" class="card-img-top" alt="..." />
              <div class="card-body">
                <h5 class="card-title">ကြက်ကြော် & Cola</h5>
                <a id="choosebtn" href="#" class="choose-btn" data-text="Kpay QRကို scan ဖတ်ပြီး 15000 လွှဲပေးပါ"><span>ရွေးချယ်မယ်</span> </a>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <img src="images/durin.webp" class="card-img-top" alt="..." />
              <div class="card-body">
                <h5 class="card-title">ဒူးရင်းသီး</h5>
                <a id="choosebtn" href="#" class="choose-btn" data-text="Kpay QRကို scan ဖတ်ပြီး 50000 လွှဲပေးပါ"><span>ရွေးချယ်မယ်</span> </a>
              </div>
            </div>
          </div>
          <div class="col">
            <div class="card">
              <img
                src="images/dubai chocolate.webp"
                class="card-img-top"
                alt="..."
              />
              <div class="card-body">
                <h5 class="card-title">ဒူဘိုင်း chocolate</h5>
                <a id="choosebtn" href="#" class="choose-btn" data-text="Kpay QRကို scan ဖတ်ပြီး 50000 လွှဲပေးပါ"><span>ရွေးချယ်မယ်</span> </a>
              </div>
            </div>
          </div>
          <!-- <div class="col">
            <div class="card">
              <img src="images/water.webp" class="card-img-top" alt="..." />
              <div class="card-body">
                <h5 class="card-title">ရေ</h5>
                <a id="choosebtn" href="#"><span>ရွေးချယ်မယ်</span> </a>
              </div>
            </div>
          </div> -->
          <div class="col">
            <div class="water-flip-card">
              <div class="water-flip-inner">
                <div class="water-front">
                  <div class="card h-100">
                    <img
                      src="images/water.webp"
                      class="card-img-top"
                      alt="..."
                    />
                    <div
                      class="card-body text-center"
                      style="background-color: #0c2f79"
                    >
                      <h5 class="card-title watertext text-white">ရေ</h5>
                      <a
                        id="choosebtn"
                        href="#"
                        class="btn choose-btn btn-dark d-flex align-items-center justify-content-center"
                        
                        ><span>ရွေးချယ်မယ်</span></a
                      >
                    </div>
                  </div>
                </div>

                <div class="water-back p-3">
                  <h5 class="fw-bold text-warning">
                    ဖိတ်ဖရန့်မှန်း သိလိုက်ပါပြီ
                  </h5>
                  <img
                    src="images/Sad Bunny Sticker by vobot.gif"
                    alt=""
                    style="width: 200px"
                  />
                  <small class="text-white-50">Free Gift Voucher!</small>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <div id="myCustomModal" class="custom-modal-overlay">
        <div class="custom-modal-box">
          <button class="modal-close-btn" id="closeModalBtn">&times;</button>

          <img
            src="images/Cat Love Sticker by MixFlavor 綜合口味.gif"
            alt="Sticker"
            class="modal-sticker"
          />

          <img src="images/kpayQR.jpg" alt="QR Code" class="modal-qr "   />
          <h5 class="mt-3" style="color: #0c2f79; font-weight: bold">
           
          </h5>
          <p class="text-muted small">ကျေးဇူးတင်ပါတယ်ရှင့်!</p>
        </div>
      </div>
    </div>

    <script>
     document.addEventListener("DOMContentLoaded", function () {
    const modal = document.getElementById("myCustomModal");
    const closeBtn = document.getElementById("closeModalBtn");
    const modalH5 = modal.querySelector("h5"); // Modal ထဲက h5 ကို ဖမ်းတာ

    const selectButtons = document.querySelectorAll(".choose-btn, #choosebtn");

    selectButtons.forEach(button => {
        button.addEventListener("click", function (e) {
            e.preventDefault();
            
            // နှိပ်လိုက်တဲ့ ခလုတ်ထဲက data-text ကို ယူမယ်
            const newText = button.getAttribute("data-text");
            
            // Modal ထဲက h5 စာသားကို အဲ့ဒီစာနဲ့ လဲလိုက်မယ်
            if(newText) {
                modalH5.innerText = newText;
            }

            modal.classList.add("show");
        });
    });

    closeBtn.addEventListener("click", function () {
        modal.classList.remove("show");
    });

    window.onclick = function (event) {
        if (event.target == modal) {
            modal.classList.remove("show");
        }
    };
});
    </script>
  </body>
</html>
